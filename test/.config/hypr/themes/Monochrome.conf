# ============================================
# Monochrome Dark Theme
# Based on Monochrome GTK theme colors
# monochrome.conf
# ============================================

# Accent colors (medium grays from GTK theme)
$accent-rose = rgb(bebebe)
$accent-roseAlpha = bebebe
$accent-coral = rgb(a8a8a8)
$accent-coralAlpha = a8a8a8
$accent-pink = rgb(9e9e9e)
$accent-pinkAlpha = 9e9e9e
$accent-purple = rgb(8c8c8c)
$accent-purpleAlpha = 8c8c8c
$accent-red = rgb(808080)
$accent-redAlpha = 808080
$accent-maroon = rgb(737373)
$accent-maroonAlpha = 737373
$accent-orange = rgb(666666)
$accent-orangeAlpha = 666666
$accent-yellow = rgb(b0b0b0)
$accent-yellowAlpha = b0b0b0
$accent-green = rgb(8c8c8c)
$accent-greenAlpha = 8c8c8c
$accent-teal = rgb(808080)
$accent-tealAlpha = 808080
$accent-cyan = rgb(737373)
$accent-cyanAlpha = 737373
$accent-sapphire = rgb(666666)
$accent-sapphireAlpha = 666666
$accent-blue = rgb(a0a0a0)
$accent-blueAlpha = a0a0a0
$accent-lavender = rgb(b0b0b0)
$accent-lavenderAlpha = b0b0b0

# Text colors (from GTK theme - #bebebe and variants)
$fg-primary = rgb(bebebe)
$fg-primaryAlpha = bebebe
$fg-secondary = rgb(afafaf)
$fg-secondaryAlpha = afafaf
$fg-tertiary = rgb(969696)
$fg-tertiaryAlpha = 969696

# Border/Overlay colors (medium gray - GTK selection color)
$border-2 = rgb(5a5a5a)
$border-2Alpha = 5a5a5a
$border-1 = rgb(4d4d4d)
$border-1Alpha = 4d4d4d
$border-0 = rgb(404040)
$border-0Alpha = 404040

# Surface colors (from GTK theme backgrounds)
$surface-2 = rgb(3c3c3c)
$surface-2Alpha = 3c3c3c
$surface-1 = rgb(373737)
$surface-1Alpha = 373737
$surface-0 = rgb(323232)
$surface-0Alpha = 323232

# Background colors (from GTK theme - darkest backgrounds)
$bg-base = rgb(252525)
$bg-baseAlpha = 252525
$bg-mantle = rgb(1f1f1f)
$bg-mantleAlpha = 1f1f1f
$bg-crust = rgb(191919)
$bg-crustAlpha = 191919
